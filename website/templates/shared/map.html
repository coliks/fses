{% extends "base.html" %} {% block title %}Map{% endblock %}
{% block extra_css %} <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" /> {% endblock %}

{% block content %}

<div class="ml-72 p-6">
  <div class="flex flex-col items-start">
    <span class="text-3xl font-semibold">Map</span>
    <span class="text-sm"
      >Here are the registered establishment in map view.</span
    >
  </div>
  <div class="mt-5 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button
        class="flex items-center gap-3 bg-gray-600 text-white px-4 py-3 rounded-md"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="size-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 3c2.755 0 5.455.232 8.083.678.533.09.917.556.917 1.096v1.044a2.25 2.25 0 0 1-.659 1.591l-5.432 5.432a2.25 2.25 0 0 0-.659 1.591v2.927a2.25 2.25 0 0 1-1.244 2.013L9.75 21v-6.568a2.25 2.25 0 0 0-.659-1.591L3.659 7.409A2.25 2.25 0 0 1 3 5.818V4.774c0-.54.384-1.006.917-1.096A48.32 48.32 0 0 1 12 3Z"
          />
        </svg>

        <span class="text-sm">Filter</span>
      </button>
      <input
        type="text"
        class="text-sm px-4 py-3 rounded-md w-80 border"
        placeholder="Search here"
      />
      <button class="p-3 bg-blue-600 text-white rounded-md">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="size-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
          />
        </svg>
      </button>
    </div>
    <div class="flex items-center gap-3"></div>
  </div>
  <div id="map" class="mt-5 h-[75vh] rounded-md"></div>
</div>

{% endblock %}


{% block extra_scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
  var map = L.map("map").setView([14.2810, 121.4160], 14);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors",
  }).addTo(map);

</script>

{% endblock %}
